<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERPLEXITY-AI</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="layout-grid"></i>
                    <span>Perplexity</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active">
                    <i data-lucide="search"></i>
                    <span>Search</span>
                </button>
                <button class="nav-item">
                    <i data-lucide="monitor"></i>
                    <span>Computer</span>
                </button>
                <button class="nav-item">
                    <i data-lucide="plus-circle"></i>
                    <span>New thread</span>
                </button>
                <button class="nav-item">
                    <i data-lucide="history"></i>
                    <span>History</span>
                </button>
                <button class="nav-item">
                    <i data-lucide="compass"></i>
                    <span>Discover</span>
                </button>
                <button class="nav-item">
                    <i data-lucide="layers"></i>
                    <span>Spaces</span>
                </button>
                <button class="nav-item">
                    <i data-lucide="trending-up"></i>
                    <span>Finance</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </button>
                <button class="nav-item">
                    <i data-lucide="help-circle"></i>
                    <span>Help</span>
                </button>
                <div class="profile-section">
                    <div class="nav-item">
                        <div style="background: #ef4444; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white;">B</div>
                        <span>Log in</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="sidebar-toggle action-btn">
                        <i data-lucide="panel-left"></i>
                    </button>
                </div>
                <div class="header-right">
                    <button class="btn-secondary">Log in</button>
                    <button class="btn-primary">Sign up</button>
                </div>
            </header>

            <!-- Dashboard Hero -->
            <section id="heroDashboard" class="hero">
                <h1 class="hero-title">perplexity</h1>
                
                <div class="hero-suggestions">
                    <!-- Suggestion Cards -->
                    <div class="suggestions">
                        <button class="suggestion-card">
                            <i data-lucide="graduation-cap"></i>
                            <span>Help me learn</span>
                        </button>
                        <button class="suggestion-card">
                            <i data-lucide="calendar"></i>
                            <span>Organize my life</span>
                        </button>
                        <button class="suggestion-card">
                            <i data-lucide="briefcase"></i>
                            <span>Build a business</span>
                        </button>
                        <button class="suggestion-card">
                            <i data-lucide="activity"></i>
                            <span>Monitor the situation</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Response Container -->
            <div id="chatResponse" class="chat-response-container" style="display: none;">
                <div class="response-box">
                    <div class="response-header">
                        <i data-lucide="sparkles"></i>
                        <span>Perplexity Answer</span>
                    </div>
                    <div id="responseText" class="response-text"></div>
                </div>
            </div>

            <!-- Persistent Search Wrapper -->
            <div id="searchWrapper" class="search-wrapper landing-mode">
                <div class="search-container">
                    <div class="search-bar-wrapper">
                        <div id="filePreview" class="file-preview" style="display: none;">
                            <div class="file-pill">
                                <i data-lucide="file-text"></i>
                                <span id="fileName">document.pdf</span>
                                <button id="removeFile"><i data-lucide="x"></i></button>
                            </div>
                        </div>

                        <div class="input-row">
                            <textarea id="chatInput" placeholder="Ask anything..." class="search-input" rows="1"></textarea>
                        </div>
                        
                        <div class="input-actions">
                            <div class="left-actions">
                                <button id="attachBtn" class="action-btn">
                                    <i data-lucide="plus"></i>
                                    <span>Focus</span>
                                </button>
                                <input type="file" id="fileInput" accept=".pdf,.txt" style="display: none;">
                                <button class="action-btn pill">
                                    <i data-lucide="monitor"></i>
                                    <span>Computer</span>
                                </button>
                            </div>
                            <div class="right-actions">
                                <button class="action-btn">
                                    <span>Model</span>
                                    <i data-lucide="chevron-down"></i>
                                </button>
                                <button class="action-btn">
                                    <i data-lucide="mic"></i>
                                </button>
                                <button id="sendBtn" class="send-btn">
                                    <i data-lucide="arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>

</html>
